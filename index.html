```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>띵동! 국악교실</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Pretendard', sans-serif;
}

body{
    width:100%;
    height:100vh;

    background-image:url('background.jpg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.15);

    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
    width:90%;
    max-width:1200px;
}

.title{
    font-size:4rem;
    color:white;
    font-weight:900;

    text-shadow:
        -3px -3px 0 #000,
         3px -3px 0 #000,
        -3px  3px 0 #000,
         3px  3px 0 #000,
         0px -3px 0 #000,
         0px  3px 0 #000,
        -3px  0px 0 #000,
         3px  0px 0 #000;

    margin-bottom:20px;
}

.subtitle{
    color:white;
    font-size:1.3rem;
    font-weight:600;

    margin-bottom:50px;

    text-shadow:1px 1px 5px rgba(0,0,0,0.4);
}

.button-group{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
}

.menu-btn{

    width:260px;
    height:120px;

    border:none;
    border-radius:30px;

    font-size:2rem;
    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
    0 8px 20px rgba(0,0,0,0.2);
}

.learn{
    background:#FFD166;
    color:#5A3D00;
}

.play{
    background:#7BDFF2;
    color:#004E64;
}

.sub-btn{

    width:220px;
    height:90px;

    border:none;
    border-radius:25px;

    background:white;

    font-size:1.3rem;
    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
    0 6px 15px rgba(0,0,0,0.15);
}

.sub-btn:hover{
    transform:translateY(-5px);
}

.menu-btn:hover{
    transform:translateY(-8px) scale(1.05);
}

.hidden{
    display:none;
}

.back-btn{

    margin-top:30px;

    width:180px;
    height:60px;

    border:none;
    border-radius:20px;

    background:#ff8fab;
    color:white;

    font-size:1.1rem;
    font-weight:bold;

    cursor:pointer;
}

.section-title{
    font-size:3rem;
    color:white;
    margin-bottom:40px;
    text-shadow:2px 2px 5px rgba(0,0,0,0.4);
}

@media(max-width:768px){

.title{
    font-size:2.5rem;
}

.section-title{
    font-size:2rem;
}

.menu-btn{
    width:220px;
    height:100px;
    font-size:1.6rem;
}

.sub-btn{
    width:180px;
    height:80px;
    font-size:1rem;
}

}

</style>
</head>

<body>

<div class="overlay">

<div class="container">

<!-- 메인 화면 -->
<div id="mainPage">

<h1 class="title">띵동! 국악교실</h1>

<p class="subtitle">
신나게 배우고 즐겁게 놀자!
</p>

<div class="button-group">

<button class="menu-btn learn"
onclick="showPage('learnPage')">
📚 국악 배움터
</button>

<button class="menu-btn play"
onclick="showPage('playPage')">
🎮 국악 놀이터
</button>

</div>

</div>

<!-- 국악 배움터 -->
<div id="learnPage" class="hidden">

<h2 class="section-title">📚 국악 배움터</h2>

<div class="button-group">

<button class="sub-btn">가야금</button>
<button class="sub-btn">거문고</button>
<button class="sub-btn">해금</button>
<button class="sub-btn">아쟁</button>
<button class="sub-btn">대금</button>
<button class="sub-btn">피리</button>
<button class="sub-btn">타악</button>

</div>

<button class="back-btn"
onclick="goHome()">
🏠 메인으로
</button>

</div>

<!-- 국악 놀이터 -->
<div id="playPage" class="hidden">

<h2 class="section-title">🎮 국악 놀이터</h2>

<div class="button-group">

<button class="sub-btn">🎧 듣고 맞춰봐!</button>
<button class="sub-btn">👀 보고 맞춰봐!</button>
<button class="sub-btn">📦 상자에 넣어줘!</button>
<button class="sub-btn">⭕❌ OX 퀴즈</button>

</div>

<button class="back-btn"
onclick="goHome()">
🏠 메인으로
</button>

</div>

</div>
</div>

<script>

function showPage(pageId){

document.getElementById("mainPage").classList.add("hidden");

document.getElementById("learnPage").classList.add("hidden");

document.getElementById("playPage").classList.add("hidden");

document.getElementById(pageId).classList.remove("hidden");

}

function goHome(){

document.getElementById("mainPage").classList.remove("hidden");

document.getElementById("learnPage").classList.add("hidden");

document.getElementById("playPage").classList.add("hidden");

}

</script>

</body>
</html>
```
