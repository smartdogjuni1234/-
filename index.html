```html
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>띵동! 국악교실</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="overlay">

<div class="container">

<!-- 메인 화면 -->
<div id="mainPage">

<h1 class="title">띵동! 국악교실</h1>

<p class="subtitle">
신나게 배우고 즐겁게 놀자!
</p>

<div class="button-group">

<button class="menu-btn learn"
onclick="showPage('learnPage')">
📚 국악 배움터
</button>

<button class="menu-btn play"
onclick="showPage('playPage')">
🎮 국악 놀이터
</button>

</div>

</div>

<!-- 국악 배움터 -->
<div id="learnPage" class="hidden">

<h2 class="section-title">📚 국악 배움터</h2>

<div class="button-group">

<button class="sub-btn">가야금</button>
<button class="sub-btn">거문고</button>
<button class="sub-btn">해금</button>
<button class="sub-btn">아쟁</button>
<button class="sub-btn">대금</button>
<button class="sub-btn">피리</button>
<button class="sub-btn">장구</button>
<button class="sub-btn">북</button>
<button class="sub-btn">징</button>
<button class="sub-btn">꽹과리</button>
<button class="sub-btn">소고</button>
<button class="sub-btn">단소</button>

</div>

<button class="back-btn" onclick="goHome()">
🏠 메인으로
</button>

</div>

<!-- 국악 놀이터 -->
<div id="playPage" class="hidden">

<h2 class="section-title">🎮 국악 놀이터</h2>

<div class="button-group">

<button class="sub-btn">
🎧 듣고 맞춰봐!
</button>

<button class="sub-btn"
onclick="showPage('difficultyPage')">
👀 보고 맞춰봐!
</button>

<button class="sub-btn">
📦 상자에 넣어줘!
</button>

<button class="sub-btn">
⭕❌ OX 퀴즈
</button>

</div>

<button class="back-btn" onclick="goHome()">
🏠 메인으로
</button>

</div>

<!-- 난이도 선택 -->
<div id="difficultyPage" class="hidden">

<h2 class="section-title">난이도 선택</h2>

<div class="button-group">

<button class="sub-btn"
onclick="startQuiz()">
⭐ 별 1
</button>

<button class="sub-btn">
⭐⭐ 별 2
</button>

<button class="sub-btn">
⭐⭐⭐ 별 3
</button>

</div>

<button class="back-btn"
onclick="showPage('playPage')">
↩ 돌아가기
</button>

</div>

<!-- 퀴즈 화면 -->
<div id="quizPage" class="hidden">

<h2 class="section-title">
문제 <span id="questionNumber">1</span>/10
</h2>

<img id="quizImage" class="quiz-image">

<div id="answerButtons"
class="button-group"></div>

<div id="resultArea"></div>

</div>

<!-- 결과 화면 -->
<div id="resultPage" class="hidden">

<h2 class="section-title">결과 발표</h2>

<h3 id="finalScore"></h3>

<p id="finalMessage"></p>

<button class="back-btn"
onclick="restartQuiz()">
다시하기
</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
```
