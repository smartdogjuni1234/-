<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>국악팡팡</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Pretendard', sans-serif;
}

body{
    width:100%;
    height:100vh;

    /* 여기에 배경 이미지 넣기 */
    background-image:url('background.jpg');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.15);

    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
}

.title{
    font-size:4rem;
    color:white;
    font-weight:900;

    text-shadow:
        3px 3px 0px #ffb703,
        6px 6px 0px rgba(0,0,0,0.2);

    margin-bottom:20px;
}

.subtitle{
    color:white;
    font-size:1.3rem;
    font-weight:600;

    margin-bottom:50px;

    text-shadow:1px 1px 5px rgba(0,0,0,0.4);
}

.button-group{
    display:flex;
    gap:30px;
    justify-content:center;
    flex-wrap:wrap;
}

.menu-btn{

    width:260px;
    height:120px;

    border:none;
    border-radius:30px;

    font-size:2rem;
    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
    0 8px 20px rgba(0,0,0,0.2);
}

.learn{
    background:#FFD166;
    color:#5A3D00;
}

.play{
    background:#7BDFF2;
    color:#004E64;
}

.menu-btn:hover{
    transform:translateY(-8px) scale(1.05);
}

.menu-btn:active{
    transform:scale(0.95);
}

@media(max-width:768px){

.title{
    font-size:2.8rem;
}

.menu-btn{
    width:220px;
    height:100px;
    font-size:1.6rem;
}

}

</style>

</head>

<body>

<div class="overlay">

    <div class="container">

        <h1 class="title">🎵 띵동~국악교실 🎵</h1>

        <p class="subtitle">
            신나게 배우고 즐겁게 놀자!
        </p>

        <div class="button-group">

            <button class="menu-btn learn">
                📚 국악 배움터
            </button>

            <button class="menu-btn play">
                🎮 국악 놀이터
            </button>

        </div>

    </div>

</div>

</body>
</html>
